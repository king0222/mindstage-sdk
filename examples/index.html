<!doctype html>
<html lang="zh-CN">

<head>
  <meta charset="UTF-8" />
  <meta http-equiv="Cache-Control" content="no-cache, no-store, must-revalidate">
  <meta http-equiv="Pragma" content="no-cache">
  <meta http-equiv="Expires" content="0">
  <link rel="icon" href="https://www.mindstage.app/favicon.ico" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>MindStage SDK | Professional Mind Map Engine</title>
  <meta name="description"
    content="A professional, lightweight core mind map engine for high performance rendering. Powered by MindStage.app." />
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&family=JetBrains+Mono&display=swap"
    rel="stylesheet">
  <style>
    :root {
      --primary: #6366f1;
      --primary-hover: #4f46e5;
      --bg-app: #f8fafc;
      --bg-card: #ffffff;
      --text-main: #1e293b;
      --text-muted: #64748b;
      --border: #e2e8f0;
      --sidebar-width: 400px;
    }

    * {
      margin: 0;
      padding: 0;
      box-sizing: border-box;
    }

    body {
      font-family: 'Inter', -apple-system, sans-serif;
      background-color: var(--bg-app);
      color: var(--text-main);
      height: 100vh;
      display: flex;
      flex-direction: column;
      overflow: hidden;
    }

    /* Layout Structure */
    .app-header {
      height: 64px;
      background: white;
      border-bottom: 1px solid var(--border);
      display: flex;
      align-items: center;
      justify-content: space-between;
      padding: 0 24px;
      z-index: 100;
      flex-shrink: 0;
    }

    .app-logo {
      display: flex;
      align-items: center;
      gap: 12px;
      font-weight: 700;
      font-size: 1.25rem;
      color: var(--primary);
      text-decoration: none;
    }

    .app-main {
      flex: 1;
      display: flex;
      overflow: hidden;
    }

    /* Sidebar controls */
    .sidebar {
      width: var(--sidebar-width);
      background: white;
      border-right: 1px solid var(--border);
      display: flex;
      flex-direction: column;
      flex-shrink: 0;
    }

    .sidebar-content {
      flex: 1;
      overflow-y: auto;
      padding: 24px;
    }

    .section {
      margin-bottom: 32px;
    }

    .section-title {
      font-size: 0.875rem;
      font-weight: 600;
      text-transform: uppercase;
      letter-spacing: 0.05em;
      color: var(--text-muted);
      margin-bottom: 16px;
      display: flex;
      align-items: center;
      gap: 8px;
    }

    /* Controls */
    .btn-group {
      display: grid;
      grid-template-columns: 1fr 1fr;
      gap: 8px;
    }

    .btn {
      padding: 10px 16px;
      border-radius: 8px;
      font-size: 0.875rem;
      font-weight: 600;
      cursor: pointer;
      transition: all 0.2s;
      border: 1px solid var(--border);
      background: white;
      display: flex;
      align-items: center;
      justify-content: center;
      gap: 8px;
    }

    .btn-primary {
      background: var(--primary);
      color: white;
      border-color: var(--primary);
    }

    .btn-primary:hover {
      background: var(--primary-hover);
    }

    .btn:hover:not(.btn-primary) {
      background: #f1f5f9;
    }

    /* Editor */
    .json-editor-wrapper {
      position: relative;
      margin-top: 8px;
    }

    .json-editor {
      width: 100%;
      height: 250px;
      font-family: 'JetBrains Mono', monospace;
      font-size: 12px;
      padding: 12px;
      border: 1px solid var(--border);
      border-radius: 8px;
      background: #0f172a;
      color: #94a3b8;
      resize: vertical;
    }

    .json-editor:focus {
      outline: none;
      border-color: var(--primary);
      box-shadow: 0 0 0 3px rgba(99, 102, 241, 0.1);
    }

    /* Palette UI */
    .palette-grid {
      display: grid;
      grid-template-columns: repeat(5, 1fr);
      gap: 8px;
      margin-bottom: 12px;
    }

    .color-swatch {
      aspect-ratio: 1;
      border-radius: 4px;
      cursor: pointer;
      border: 2px solid transparent;
      transition: transform 0.2s;
    }

    .color-swatch:hover {
      transform: scale(1.1);
    }

    .color-swatch.active {
      border-color: var(--text-main);
      box-shadow: 0 0 0 2px white inset;
    }

    /* Preview Area */
    .preview-area {
      flex: 1;
      background: #f1f5f9;
      position: relative;
      overflow: hidden;
      display: flex;
      align-items: center;
      justify-content: center;
    }

    .canvas-container {
      width: 100%;
      height: 100%;
      overflow: auto;
      display: flex;
      align-items: center;
      justify-content: center;
      padding: 40px;
    }

    .canvas-container svg {
      background: white;
      box-shadow: 0 10px 30px rgba(0, 0, 0, 0.05);
      border-radius: 12px;
      max-width: none;
    }

    /* Floating Toolbar */
    .viewport-toolbar {
      position: absolute;
      bottom: 24px;
      left: 50%;
      transform: translateX(-50%);
      background: white;
      padding: 6px;
      border-radius: 12px;
      border: 1px solid var(--border);
      box-shadow: 0 10px 25px rgba(0, 0, 0, 0.1);
      display: flex;
      gap: 4px;
    }

    .toolbar-btn {
      width: 40px;
      height: 40px;
      border-radius: 8px;
      display: flex;
      align-items: center;
      justify-content: center;
      cursor: pointer;
      border: 1px solid transparent;
      background: transparent;
      transition: all 0.2s;
    }

    .toolbar-btn:hover {
      background: #f1f5f9;
      color: var(--primary);
    }

    /* Status Toast */
    #status {
      position: fixed;
      top: 24px;
      right: 24px;
      z-index: 1000;
    }

    .status-toast {
      padding: 12px 20px;
      border-radius: 8px;
      background: white;
      box-shadow: 0 10px 15px rgba(0, 0, 0, 0.1);
      border-left: 4px solid var(--primary);
      margin-bottom: 8px;
      font-size: 0.875rem;
      animation: slideIn 0.3s ease-out;
    }

    @keyframes slideIn {
      from {
        transform: translateX(100%);
        opacity: 0;
      }

      to {
        transform: translateX(0);
        opacity: 1;
      }
    }

    .form-select {
      width: 100%;
      padding: 8px 12px;
      border: 1px solid var(--border);
      border-radius: 8px;
      background: white;
      font-size: 0.875rem;
      cursor: pointer;
    }

    .form-select:focus {
      outline: none;
      border-color: var(--primary);
    }

    /* Powered by footer inside sidebar */
    .sidebar-footer {
      padding: 24px;
      border-top: 1px solid var(--border);
      background: #f8fafc;
      font-size: 0.75rem;
      color: var(--text-muted);
      text-align: center;
    }

    .sidebar-footer a {
      color: var(--primary);
      text-decoration: none;
      font-weight: 600;
    }

    /* Tooltip styling for SVG elements */
    .node-group:hover rect {
      filter: brightness(0.98);
    }
  </style>
</head>

<body>

  <header class="app-header">
    <a href="#" class="app-logo">
      <img src="https://www.mindstage.app/favicon.ico" alt="MindStage Logo" width="24" height="24" />
      MindStage SDK
    </a>
    <div style="display: flex; gap: 12px;">
      <button class="btn btn-success" onclick="downloadSVG()">
        <svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"
          stroke-linecap="round" stroke-linejoin="round">
          <path d="M21 15v4a2 2 0 0 1-2 2H5a2 2 0 0 1-2-2v-4" />
          <polyline points="7 10 12 15 17 10" />
          <line x1="12" y1="15" x2="12" y2="3" />
        </svg>
        Export SVG
      </button>
      <a href="https://github.com/king0222/mindstage-sdk" target="_blank" class="btn">GitHub</a>
    </div>
  </header>

  <main class="app-main">
    <aside class="sidebar">
      <div class="sidebar-content">

        <div class="section">
          <h3 class="section-title">📦 DATA SOURCE</h3>
          <div class="btn-group" style="margin-bottom: 12px;">
            <button class="btn" onclick="loadExample('business')">🏢 Business</button>
            <button class="btn" onclick="loadExample('complete')">🧩 Complete</button>
          </div>
          <div class="json-editor-wrapper">
            <textarea id="jsonInput" class="json-editor" spellcheck="false"></textarea>
          </div>
          <div style="margin-top: 12px; display: flex; gap: 8px;">
            <button class="btn" style="flex:1" onclick="formatJSON()">Format</button>
            <button class="btn btn-primary" style="flex:2" onclick="renderMindMap()">Apply & Render</button>
          </div>
        </div>

        <div class="section">
          <h3 class="section-title">📐 LAYOUT CONFIG</h3>
          <div style="display: grid; gap: 16px;">
            <div>
              <label
                style="font-size: 12px; color: var(--text-muted); display: block; margin-bottom: 4px;">DIRECTION</label>
              <select id="layoutDirection" class="form-select" onchange="renderMindMap()">
                <option value="left-right">Standard (Mixed)</option>
                <option value="right">Right Only</option>
                <option value="left">Left Only</option>
              </select>
            </div>
          </div>
        </div>

        <div class="section">
          <h3 class="section-title">🎨 BRANCH PALETTE</h3>
          <div id="palette-container" class="palette-grid">
            <!-- Populated by JS -->
          </div>
          <p style="font-size: 11px; color: var(--text-muted);">Click colors to customize the hierarchy rendering.</p>
        </div>

      </div>

      <div class="sidebar-footer">
        🚀 Powered by <a href="https://mindstage.app" target="_blank">MindStage.app</a><br>
        AI Mind Map Generation • PDF Export • LaTeX Support
      </div>
    </aside>

    <section class="preview-area">
      <div id="mindmapContainer" class="canvas-container">
        <div style="text-align: center; color: var(--text-muted);">
          <div style="font-size: 48px; margin-bottom: 16px;">🧠</div>
          <p>Ready to render your mind map</p>
        </div>
      </div>

      <div class="viewport-toolbar">
        <button class="toolbar-btn" onclick="zoomIn()" title="Zoom In">
          <svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
            <circle cx="11" cy="11" r="8" />
            <line x1="21" y1="21" x2="16.65" y2="16.65" />
            <line x1="11" y1="8" x2="11" y2="14" />
            <line x1="8" y1="11" x2="14" y2="11" />
          </svg>
        </button>
        <button class="toolbar-btn" onclick="zoomOut()" title="Zoom Out">
          <svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
            <circle cx="11" cy="11" r="8" />
            <line x1="21" y1="21" x2="16.65" y2="16.65" />
            <line x1="8" y1="11" x2="14" y2="11" />
          </svg>
        </button>
        <div style="width: 1px; background: var(--border); margin: 0 4px;"></div>
        <button class="toolbar-btn" onclick="renderMindMap()" title="Refresh">
          <svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
            <path d="M23 4v6h-6" />
            <path d="M20.49 15a9 9 0 1 1-2.12-9.36L23 10" />
          </svg>
        </button>
      </div>
    </section>
  </main>

  <div id="status"></div>

  <!-- Load bundled SDK -->
  <script src="../dist/mindstage-sdk.js?v=3"></script>

  <script>
    const { renderMindMapFromJSON } = MindStageSDK || {};

    // Current app state
    let currentScale = 1;
    let mindMapData = null;
    let customPalette = [
      '#6366f1', '#8b5cf6', '#ec4899', '#f43f5e', '#ef4444',
      '#f59e0b', '#eab308', '#84cc16', '#22c55e', '#10b981'
    ];

    const examples = {
      business: {
        content: "Roadmap",
        children: [
          { content: "Product Development", children: [{ content: "MVP Launch" }, { content: "User Feedback Loop" }, { content: "v1.0 Release" }] },
          { content: "Market Strategy", children: [{ content: "SEO Optimization" }, { content: "Social Media Campaign" }, { content: "Partnerships" }] },
          { content: "Financials", children: [{ content: "Seed Funding" }, { content: "Budget Allocation" }, { content: "Revenue Projections" }] },
          { content: "Operations", children: [{ content: "Hiring Core Team" }, { content: "Legal & Compliance" }, { content: "Infrastructure Setup" }] }
        ]
      },
      complete: {
        content: "Overview",
        children: [
          { content: "Rendering", children: [{ content: "SVG Output" }, { content: "Canvas Output" }, { content: "High Resolution" }] },
          { content: "Layout", children: [{ content: "Mixed Direction" }, { content: "Automatic Spacing" }, { content: "Collision Detection" }] },
          { content: "Styling", children: [{ content: "Configurable Palettes" }, { content: "Node Shapes" }, { content: "Custom Fonts" }] },
          { content: "Interactivity", children: [{ content: "Expand/Collapse" }, { content: "Event Hooks" }, { content: "Selection State" }] }
        ]
      }
    };

    // Initialize
    document.addEventListener('DOMContentLoaded', () => {
      initPaletteUI();
      loadExample('business');

      // Setup event delegation for SVG collapse buttons
      const container = document.getElementById('mindmapContainer');
      container.addEventListener('click', (e) => {
        const btn = e.target.closest('.collapse-btn');
        if (btn) {
          const nodeId = btn.getAttribute('data-id');
          toggleNodeCollapse(nodeId);
        }
      });
    });

    function initPaletteUI() {
      const container = document.getElementById('palette-container');
      container.innerHTML = customPalette.map((color, i) => `
        <div class="color-swatch" 
             style="background-color: ${color}" 
             onclick="changePaletteColor(${i})"
             title="Change branch color ${i + 1}"></div>
      `).join('');
    }

    function changePaletteColor(index) {
      const newColor = prompt('Enter hex color:', customPalette[index]);
      if (newColor && /^#[0-9A-F]{6}$/i.test(newColor)) {
        customPalette[index] = newColor;
        initPaletteUI();
        renderMindMap();
      }
    }

    function loadExample(name) {
      mindMapData = examples[name];
      document.getElementById('jsonInput').value = JSON.stringify(mindMapData, null, 2);
      renderMindMap();
      showStatus('Loaded ' + name + ' example');
    }

    function formatJSON() {
      try {
        const input = document.getElementById('jsonInput');
        input.value = JSON.stringify(JSON.parse(input.value), null, 2);
        showStatus('JSON formatted');
      } catch (e) {
        showStatus('Invalid JSON', 'error');
      }
    }

    function renderMindMap() {
      const container = document.getElementById('mindmapContainer');
      const jsonStr = document.getElementById('jsonInput').value;
      const direction = document.getElementById('layoutDirection').value;

      try {
        mindMapData = JSON.parse(jsonStr);

        // Ensure stable IDs
        ensureIds(mindMapData.root || mindMapData);
        document.getElementById('jsonInput').value = JSON.stringify(mindMapData, null, 2);

        const svg = renderMindMapFromJSON(mindMapData, {
          backgroundColor: '#ffffff',
          scale: currentScale,
          padding: 60,
          branchPalette: customPalette,
          layoutOptions: {
            layoutDirection: direction
          }
        });
        container.innerHTML = svg;
      } catch (e) {
        showStatus('Render failed: ' + e.message, 'error');
        console.error(e);
      }
    }

    function ensureIds(node) {
      if (!node.id) node.id = 'node_' + Math.random().toString(36).substr(2, 9);
      if (node.children) node.children.forEach(ensureIds);
    }

    // Node Interactivity Logic
    function toggleNodeCollapse(nodeId) {
      if (!mindMapData) return;

      let found = false;
      const traverse = (node) => {
        if (node.id === nodeId) {
          node.meta = node.meta || {};
          node.meta.collapsed = !node.meta.collapsed;
          found = true;
          return true;
        }
        if (node.children) {
          for (const child of node.children) {
            if (traverse(child)) return true;
          }
        }
        return false;
      };

      traverse(mindMapData.root || mindMapData);

      if (found) {
        document.getElementById('jsonInput').value = JSON.stringify(mindMapData, null, 2);
        renderMindMap();
        showStatus('Toggled node collapse');
      }
    }

    function zoomIn() {
      currentScale += 0.1;
      renderMindMap();
    }

    function zoomOut() {
      if (currentScale > 0.3) {
        currentScale -= 0.1;
        renderMindMap();
      }
    }

    function downloadSVG() {
      const svg = document.querySelector('.canvas-container svg');
      if (!svg) return;

      const serializer = new XMLSerializer();
      const source = serializer.serializeToString(svg);
      const url = "data:image/svg+xml;charset=utf-8," + encodeURIComponent(source);

      const link = document.createElement("a");
      link.href = url;
      link.download = `mindmap-${Date.now()}.svg`;
      link.click();
      showStatus('SVG Exported');
    }

    function showStatus(text, type = 'success') {
      const el = document.getElementById('status');
      const toast = document.createElement('div');
      toast.className = 'status-toast';
      if (type === 'error') toast.style.borderLeftColor = '#ef4444';
      toast.textContent = text;
      el.appendChild(toast);
      setTimeout(() => toast.remove(), 3000);
    }
  </script>
</body>

</html>
